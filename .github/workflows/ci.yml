# =================================================================
# PIPELINE CI/CD : REVIEW SERVICE (GitHub Actions)
# =================================================================

name: CI/CD

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

env:
  DOCKER_IMAGE: ghcr.io/${{ github.repository_owner }}/review-service
  DOCKER_TAG: ${{ github.sha | slice(0,7) }}
  SERVICE_PORT: 3004

jobs:
  # -----------------------------------------------------------------
  # JOB 1 : TESTS API
  # -----------------------------------------------------------------
  test_api:
    name: Test API
    runs-on: ubuntu-latest

    permissions:
      contents: read
      checks: write

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: reviews_db
          POSTGRES_USER: devops_user
          POSTGRES_PASSWORD: devops_password
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 3
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Wait for PostgreSQL
        run: |
          timeout 60 sh -c 'until pg_isready -h localhost -U devops_user; do
            echo "⏳ Waiting for PostgreSQL instance..."
            sleep 2
          done'

      - name: Setup test database
        env:
          PGPASSWORD: devops_password
        run: |
          psql -h localhost -U devops_user -d reviews_db < ./testapi/data-test-api.sql

      - name: Run API tests
        env:
          DATABASE_URL: postgres://devops_user:devops_password@localhost:5432/reviews_db
          JWT_SECRET: test_secret_key
        run: |
          chmod +x ./testapi/test-api.sh
          ./testapi/test-api.sh

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-api-report
          path: test-api-report.html
          retention-days: 30

  # -----------------------------------------------------------------
  # JOB 2 : SCAN DÉPENDANCES
  # -----------------------------------------------------------------
  dependency_scanning:
    name: Dependency Scanning
    runs-on: ubuntu-latest

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'

      - name: Generate Trivy HTML report
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'template'
          template: '@/contrib/html.tpl'
          output: 'dependency-report.html'

      - name: Upload dependency report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-report
          path: dependency-report.html
          retention-days: 30

  # -----------------------------------------------------------------
  # JOB 3 : BUILD IMAGE DOCKER
  # -----------------------------------------------------------------
  docker_build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: [test_api]

    permissions:
      contents: read
      packages: read

    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
          outputs: type=docker,dest=/tmp/image.tar

      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image
          path: /tmp/image.tar
          retention-days: 1

  # -----------------------------------------------------------------
  # JOB 4 : SCAN IMAGE DOCKER
  # -----------------------------------------------------------------
  image_scanning:
    name: Scan Docker Image
    runs-on: ubuntu-latest
    needs: docker_build

    permissions:
      contents: read
      security-events: write

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Docker image artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image
          path: /tmp

      - name: Load Docker image
        run: |
          docker load --input /tmp/image.tar

      - name: Scan Docker image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
          format: 'sarif'
          output: 'trivy-container-results.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload container scan results
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-container-results.sarif'

      - name: Generate container scan HTML report
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
          format: 'template'
          template: '@/contrib/html.tpl'
          output: 'container-report.html'

      - name: Upload container report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-report
          path: container-report.html
          retention-days: 30

  # -----------------------------------------------------------------
  # JOB 5 : PUSH À DOCKER HUB
  # -----------------------------------------------------------------
  docker_push:
    name: Push to GitHub Container Registry
    runs-on: ubuntu-latest
    needs: image_scanning

    permissions:
      contents: read
      packages: write

    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.DOCKER_IMAGE }}:${{ env.DOCKER_TAG }}
            ${{ env.DOCKER_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Notify push success
        if: success()
        run: echo "✅ Image pushed successfully to Docker Hub"
